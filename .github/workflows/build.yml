name: Build and Release Installer

on:
  push:
    tags:
      - "v*"   # v1.0.0 などのタグを push したときだけ実行

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: PyInstaller でビルド
        run: pyinstaller build.spec --distpath dist --workpath build

      - name: Inno Setup をインストール
        run: choco install innosetup --yes

      - name: インストーラーを作成
        run: iscc installer.iss

      - name: GitHub Releases にアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/*.exe
